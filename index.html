<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Anneme</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            border: 2px solid #ffb6c1;
        }
        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            line-height: 1.6;
            font-size: 1.2rem;
        }
        .heart {
            color: #e74c3c;
            font-size: 50px;
            animation: beat 1s infinite alternate;
            margin: 20px 0;
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
        .btn {
            background-color: #ffb6c1;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #d63384;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>İyi Ki Varsın Anne!</h1>
        <p>Senin sevgin, dünyadaki en büyük güç. Doğum günün kutlu olsun, hayat boyu hep birlikte, hep mutlu olalım.</p>
        <p><i>"Dünyanın en güzel annesi olduğun için teşekkürler."</i></p>
        <br>
        <button class="btn" onclick="kutla()">Sürprizi Gör</button>
    </div>

    <script>
        function kutla() {
            alert("Seni çok seviyorum! 🎂🎈");
            document.body.style.backgroundColor = "#ffdeeb";
        }
    </script>
</body>
</html>
